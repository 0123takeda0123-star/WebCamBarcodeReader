<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>業務用ISBNスキャナ（安定版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
}

#scanner-container {
  position: relative;
  width: 100%;
  max-width: 520px;
  margin: auto;
  height: 70vh;
  background: black;
  overflow: hidden;
}

video, canvas {
  position: absolute !important;
  top: 0;
  left: 0;
  width: 100% !important;
  height: 100% !important;
  object-fit: contain;
}

#overlay-line {
  position: absolute;
  top: 50%;
  width: 100%;
  height: 2px;
  background: red;
  z-index: 10;
}

#latest {
  font-size: 28px;
  font-weight: bold;
  margin: 10px;
}

#status {
  font-size: 14px;
  margin: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  font-size: 12px;
  padding: 4px;
}
</style>
</head>

<body>

<h2>業務用ISBNスキャナ（安定版）</h2>

<div id="scanner-container">
  <div id="overlay-line"></div>
</div>

<div id="latest">待機中</div>
<div id="status">準備中</div>

<button onclick="exportCSV()">CSV出力</button>

<table>
<thead>
<tr>
  <th>ISBN</th>
  <th>時刻</th>
  <th>フラグ</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>
let lastISBN = null;
let seen = new Set();

let candidateBuffer = [];
let confirmCandidate = null;
let confirmCount = 0;

let history = [];

// ■ 正規化（比較用の最終整形）
function normalize(code) {
  return String(code || "")
    .replace(/\D/g, "")
    .trim();
}

// ■ ビープ
function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.value = 880;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.08);
}

// ■ 時刻
function nowTime() {
  return new Date().toLocaleTimeString();
}

// ■ 表
function addRow(isbn, time, mark) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${isbn}</td>
    <td>${time}</td>
    <td>${mark}</td>
  `;
  document.querySelector("#log").prepend(tr);
}

// ■ ===== フレームバッファ（誤読対策本体） =====
function pushBuffer(code) {
  const now = Date.now();

  candidateBuffer.push({
    code,
    t: now
  });

  // 500ms以上古いもの削除
  candidateBuffer = candidateBuffer.filter(x => now - x.t < 500);

  // 最頻値を取得
  const freq = {};
  let best = null;
  let bestCount = 0;

  for (const item of candidateBuffer) {
    const c = item.code;
    freq[c] = (freq[c] || 0) + 1;

    if (freq[c] > bestCount) {
      best = c;
      bestCount = freq[c];
    }
  }

  return best;
}

// ■ メイン処理
function handleISBN(raw) {

  let code = normalize(raw);

  // ISBNフィルタ
  if (!code.startsWith("978") && !code.startsWith("979")) return;

  // ===== ① フレーム多数決 =====
  const stable = pushBuffer(code);

  if (!stable) return;

  document.getElementById("latest").textContent = stable;

  // ===== ② 3回一致確定 =====
  if (confirmCandidate !== stable) {
    confirmCandidate = stable;
    confirmCount = 1;
    document.getElementById("status").textContent = "確認中 (1/3)";
    return;
  }

  confirmCount++;
  document.getElementById("status").textContent =
    `確認中 (${confirmCount}/3)`;

  if (confirmCount < 3) return;

  // ===== ③ 連続重複スキップ =====
  if (stable === lastISBN) return;

  // ===== ④ 再出現判定 =====
  let mark = "";
  if (seen.has(stable)) mark = "!";

  seen.add(stable);
  lastISBN = stable;

  const time = nowTime();

  history.push({
    isbn: stable,
    time,
    flag: mark
  });

  addRow(stable, time, mark);

  document.getElementById("status").textContent =
    mark ? "再出現" : "新規";

  beep();
}

// ■ CSV
function exportCSV() {
  if (!history.length) return alert("データなし");

  const csv = history
    .map(h => `${h.isbn},${h.time},${h.flag}`)
    .join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "isbn_log.csv";
  a.click();

  URL.revokeObjectURL(url);
}

// ■ Quagga
Quagga.init({
  inputStream: {
    type: "LiveStream",
    target: document.querySelector("#scanner-container"),
    constraints: {
      facingMode: "environment"
    }
  },
  decoder: {
    readers: ["ean_reader"]
  },
  locate: true,
  halfSample: true
}, function(err) {
  if (err) {
    console.error(err);
    return;
  }
  Quagga.start();
  document.getElementById("status").textContent = "スキャン中";
});

// ■ リアルタイム検出
Quagga.onDetected(result => {
  const code = result?.codeResult?.code;
  if (!code) return;
  handleISBN(code);
});
</script>

</body>
</html>
