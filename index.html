<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ISBNスキャナ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.js"></script>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    text-align: center;
  }

  #scanner-container {
    position: relative;
    width: 100%;
    max-width: 480px;
    margin: auto;
    aspect-ratio: 3/4;
    background: black;
  }

  video, canvas {
    position: absolute !important;
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  #overlay-line {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 2px;
    background: red;
    z-index: 10;
  }

  #status {
    font-size: 20px;
    margin: 10px;
  }

  #latest {
    font-size: 28px;
    font-weight: bold;
    margin: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 4px;
    font-size: 12px;
  }
</style>
</head>

<body>

<h2>業務用ISBNスキャナ</h2>

<div id="scanner-container">
  <div id="overlay-line"></div>
</div>

<div id="latest">待機中</div>
<div id="status">準備中</div>

<button onclick="exportCSV()">CSV出力</button>

<table>
  <thead>
    <tr>
      <th>ISBN</th>
      <th>時刻</th>
      <th>重複</th>
    </tr>
  </thead>
  <tbody id="log"></tbody>
</table>

<script>
let lastISBN = null;
let lastTime = 0;
let history = [];

const beep = () => {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.value = 800;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.1);
};

function nowTime() {
  const d = new Date();
  return d.toLocaleTimeString();
}

function addRow(isbn, time, dup) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${isbn}</td>
    <td>${time}</td>
    <td>${dup ? "DUP" : ""}</td>
  `;
  document.querySelector("#log").prepend(tr);
}

function handleISBN(code) {
  const now = Date.now();

  // EAN以外除外（ISBN対策）
  if (!code.startsWith("978") && !code.startsWith("979")) return;

  document.getElementById("latest").textContent = code;

  // 完全同一の連続読み取りは無視
  if (code === lastISBN && now - lastTime < 2000) {
    return;
  }

  let duplicate = false;

  // 間に別コードが挟まった場合 → 前のものを重複扱い
  if (lastISBN && code !== lastISBN) {
    const last = history[history.length - 1];
    if (last && !last.duplicate) {
      last.duplicate = true;
      duplicate = true;
    }
  }

  const time = nowTime();

  history.push({
    isbn: code,
    time,
    duplicate
  });

  addRow(code, time, duplicate);

  document.getElementById("status").textContent =
    duplicate ? "重複検出" : "OK";

  beep();

  lastISBN = code;
  lastTime = now;
}

function exportCSV() {
  if (history.length === 0) return alert("データなし");

  const csv = history.map(h =>
    `${h.isbn},${h.time},${h.duplicate ? 1 : 0}`
  ).join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "isbn_log.csv";
  a.click();

  URL.revokeObjectURL(url);
}

// ===== Quagga起動 =====
Quagga.init({
  inputStream: {
    type: "LiveStream",
    target: document.querySelector("#scanner-container"),
    constraints: {
      facingMode: "environment"
    }
  },
  decoder: {
    readers: ["ean_reader"]
  },
  locate: true
}, function(err) {
  if (err) {
    console.error(err);
    return;
  }

  Quagga.start();
  document.getElementById("status").textContent = "スキャン中";
});

// ===== リアルタイム検出 =====
Quagga.onDetected(result => {
  const code = result?.codeResult?.code;
  if (!code) return;
  handleISBN(code);
});
</script>

</body>
</html>
