<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>業務用ISBNスキャナ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
}

#scanner-container {
  position: relative;
  width: 100%;
  max-width: 520px;
  margin: auto;
  height: 70vh;
  background: black;
  overflow: hidden;
}

video, canvas {
  position: absolute !important;
  top: 0;
  left: 0;
  width: 100% !important;
  height: 100% !important;
  object-fit: contain; /* ←ズレ対策重要 */
}

#overlay-line {
  position: absolute;
  top: 50%;
  width: 100%;
  height: 2px;
  background: red;
  z-index: 10;
}

#latest {
  font-size: 28px;
  font-weight: bold;
  margin: 10px;
}

#status {
  font-size: 18px;
  margin: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  font-size: 12px;
  padding: 4px;
}
</style>
</head>

<body>

<h2>業務用ISBNスキャナ</h2>

<div id="scanner-container">
  <div id="overlay-line"></div>
</div>

<div id="latest">待機中</div>
<div id="status">準備中</div>

<button onclick="exportCSV()">CSV出力</button>

<table>
<thead>
<tr>
  <th>ISBN</th>
  <th>時刻</th>
  <th>重複</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>
let lastISBN = null;
let lastTime = 0;
let history = [];

// 3回一致確定用
let candidate = null;
let confirmCount = 0;

// ビープ
function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.value = 880;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.08);
}

function nowTime() {
  return new Date().toLocaleTimeString();
}

function addRow(isbn, time, dup) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${isbn}</td>
    <td>${time}</td>
    <td>${dup ? "DUP" : ""}</td>
  `;
  document.querySelector("#log").prepend(tr);
}

function handleISBN(code) {
  const now = Date.now();

  // ISBNフィルタ
  if (!code.startsWith("978") && !code.startsWith("979")) return;

  document.getElementById("latest").textContent = code;

  // 別コード来たらリセット
  if (candidate !== code) {
    candidate = code;
    confirmCount = 1;
    document.getElementById("status").textContent = "確認中 (1/3)";
    return;
  }

  confirmCount++;
  document.getElementById("status").textContent =
    `確認中 (${confirmCount}/3)`;

  // 3回一致しないと確定しない
  if (confirmCount < 3) return;

  // ===== 確定 =====
  let duplicate = false;

  if (lastISBN && code !== lastISBN) {
    const last = history[history.length - 1];
    if (last && !last.duplicate) {
      last.duplicate = true;
      duplicate = true;
    }
  }

  const time = nowTime();

  history.push({
    isbn: code,
    time,
    duplicate
  });

  addRow(code, time, duplicate);

  document.getElementById("status").textContent =
    duplicate ? "重複検出" : "確定";

  beep();

  lastISBN = code;
  lastTime = now;

  candidate = null;
  confirmCount = 0;
}

function exportCSV() {
  if (!history.length) return alert("データなし");

  const csv = history
    .map(h => `${h.isbn},${h.time},${h.duplicate ? 1 : 0}`)
    .join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "isbn_log.csv";
  a.click();

  URL.revokeObjectURL(url);
}

// ===== Quagga初期化 =====
Quagga.init({
  inputStream: {
    type: "LiveStream",
    target: document.querySelector("#scanner-container"),
    constraints: {
      facingMode: "environment"
    }
  },
  decoder: {
    readers: ["ean_reader"]
  },
  locate: true,
  halfSample: true
}, function(err) {
  if (err) {
    console.error(err);
    return;
  }
  Quagga.start();
  document.getElementById("status").textContent = "スキャン中";
});

// ===== リアルタイム検出 =====
Quagga.onDetected(result => {
  const code = result?.codeResult?.code;
  if (!code) return;
  handleISBN(code);
});
</script>

</body>
</html>
