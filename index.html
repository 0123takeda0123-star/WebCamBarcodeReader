<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>業務用ISBNスキャナ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
}

#scanner-container {
  position: relative;
  width: 100%;
  max-width: 520px;
  margin: auto;
  height: 70vh;
  background: black;
  overflow: hidden;
}

video, canvas {
  position: absolute !important;
  top: 0;
  left: 0;
  width: 100% !important;
  height: 100% !important;
  object-fit: contain;
}

#overlay-line {
  position: absolute;
  top: 50%;
  width: 100%;
  height: 2px;
  background: red;
  z-index: 10;
}

#latest {
  font-size: 28px;
  font-weight: bold;
  margin: 10px;
}

#status {
  font-size: 16px;
  margin: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  font-size: 12px;
  padding: 4px;
}
</style>
</head>

<body>

<h2>業務用ISBNスキャナ</h2>

<div id="scanner-container">
  <div id="overlay-line"></div>
</div>

<div id="latest">待機中</div>
<div id="status">準備中</div>

<button onclick="exportCSV()">CSV出力</button>

<table>
<thead>
<tr>
  <th>ISBN</th>
  <th>時刻</th>
  <th>フラグ</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>
let lastISBN = null;
let seen = new Set();
let candidate = null;
let confirmCount = 0;

let history = [];

// ■ ビープ
function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.value = 880;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.08);
}

// ■ 時刻
function nowTime() {
  return new Date().toLocaleTimeString();
}

// ■ 表追加
function addRow(isbn, time, mark) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${isbn}</td>
    <td>${time}</td>
    <td>${mark}</td>
  `;
  document.querySelector("#log").prepend(tr);
}

// ■ メイン処理
function handleISBN(code) {

  if (!code.startsWith("978") && !code.startsWith("979")) return;

  document.getElementById("latest").textContent = code;

  // ① 直前と同じノイズは無視
  if (candidate === code) {
    confirmCount++;
  } else {
    candidate = code;
    confirmCount = 1;
  }

  document.getElementById("status").textContent =
    `認識中 (${confirmCount}/3)`;

  // ② 3回一致しないと確定しない
  if (confirmCount < 3) return;

  // ③ 連続同一確定はスキップ
  if (code === lastISBN) return;

  let mark = "";

  // ④ 過去に出ていれば「!」
  if (seen.has(code)) {
    mark = "!";
  }

  seen.add(code);
  lastISBN = code;

  const time = nowTime();

  history.push({
    isbn: code,
    time,
    flag: mark
  });

  addRow(code, time, mark);

  document.getElementById("status").textContent =
    mark ? "再出現" : "新規";

  beep();
}

// ■ CSV
function exportCSV() {
  if (!history.length) return alert("データなし");

  const csv = history
    .map(h => `${h.isbn},${h.time},${h.flag}`)
    .join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "isbn_log.csv";
  a.click();

  URL.revokeObjectURL(url);
}

// ■ Quagga起動
Quagga.init({
  inputStream: {
    type: "LiveStream",
    target: document.querySelector("#scanner-container"),
    constraints: {
      facingMode: "environment"
    }
  },
  decoder: {
    readers: ["ean_reader"]
  },
  locate: true,
  halfSample: true
}, function(err) {
  if (err) {
    console.error(err);
    return;
  }
  Quagga.start();
  document.getElementById("status").textContent = "スキャン中";
});

// ■ リアルタイム検出
Quagga.onDetected(result => {
  const code = result?.codeResult?.code;
  if (!code) return;
  handleISBN(code);
});
</script>

</body>
</html>
